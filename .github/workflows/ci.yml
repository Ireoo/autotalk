name: 持续集成

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: 测试 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: 安装LLVM和其他依赖 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake pkg-config libssl-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libasound2-dev

      - name: 安装LLVM和其他依赖 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm cmake
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install llvm -y
          choco install cmake -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH

      - name: 缓存依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 检查代码格式
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: 代码静态分析
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings

      - name: 运行测试
        uses: actions-rs/cargo@v1
        with:
          command: test
        timeout-minutes: 20

      - name: 构建检查
        uses: actions-rs/cargo@v1
        with:
          command: build
        timeout-minutes: 30 