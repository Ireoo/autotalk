name: 构建和发布

on: [push, workflow_dispatch]

# 添加明确的权限设置
permissions:
  contents: write
  packages: write

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: autotalk.exe
            asset_name: autotalk-windows-x64.zip
          - os: ubuntu-latest
            artifact_name: autotalk
            asset_name: autotalk-linux-x64.tar.gz
          - os: macos-latest
            artifact_name: autotalk
            asset_name: autotalk-macos-x64.zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
          target: x86_64-unknown-linux-gnu

      - name: 安装LLVM和其他依赖 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake pkg-config libssl-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libasound2-dev build-essential
          # 确保安装完整的OpenSSL开发包
          sudo apt-get install -y libssl-dev
          # 显式安装OpenSSL 3.0相关包
          sudo apt-get install -y pkg-config
          # 查找OpenSSL库的实际位置
          PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          # 设置明确的OpenSSL库路径
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV
          
          # 准确查找并设置libclang路径
          sudo apt-get install -y libclang1
          LLVM_PATH=$(find /usr/lib -type d -name "llvm-*" | sort -V | tail -n 1)
          if [ -z "$LLVM_PATH" ]; then
            LLVM_PATH="/usr/lib/llvm-14" # 回退到默认版本
            sudo apt-get install -y llvm-14 libclang-14-dev
          fi
          LIBCLANG_PATH="$LLVM_PATH/lib"
          echo "找到libclang路径: $LIBCLANG_PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          
          echo "CMAKE_C_FLAGS=-m64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-m64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm cmake
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "CMAKE_C_FLAGS=-arch arm64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-arch arm64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install llvm -y
          choco install cmake -y
          # 设置环境变量
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "LLVM_CONFIG_PATH=C:\\Program Files\\LLVM\\bin\\llvm-config" >> $env:GITHUB_ENV
          # 添加到PATH - 修复语法
          $env:PATH = "$env:PATH;C:\Program Files\LLVM\bin"
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          # 检查LLVM安装和库文件
          dir "C:\\Program Files\\LLVM\\bin"
          # 设置编译标志
          echo "CMAKE_C_FLAGS=-DUNICODE -D_UNICODE" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-DUNICODE -D_UNICODE" >> $env:GITHUB_ENV
          
      # 新增步骤：创建补丁钩子，用于修复whisper-rs-sys构建错误
      - name: 设置whisper-rs-sys构建钩子 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 创建构建钩子目录
          mkdir -p $env:USERPROFILE\.cargo\target-hooks\whisper-rs-sys
          
          # 创建钩子脚本
          @"
          @echo off
          setlocal enabledelayedexpansion
          
          if "%1" == "pre-build" (
            echo "正在应用whisper-rs-sys补丁..."
            
            for /r %%f in (*ggml-cpu.cpp) do (
              echo "检查文件: %%f"
              
              powershell -Command "(Get-Content '%%f') -replace 'RegQueryValueExA\(hKey,\s*L\"ProcessorNameString\"', 'RegQueryValueExW(hKey, L\"ProcessorNameString\"' | Set-Content '%%f'"
              
              echo "已修复文件: %%f"
            )
            
            exit 0
          )
          
          exit 0
          "@ | Out-File -FilePath $env:USERPROFILE\.cargo\target-hooks\whisper-rs-sys\hook.bat -Encoding ascii
          
          # 输出钩子文件内容以验证
          type $env:USERPROFILE\.cargo\target-hooks\whisper-rs-sys\hook.bat
          
          # 设置钩子环境变量
          echo "CARGO_TARGET_HOOKS=1" >> $env:GITHUB_ENV
          
      # 添加备用方法：直接修改whisper-cpp源码
      - name: 准备whisper-cpp补丁 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 创建补丁文件
          $patchContent = @'
          #ifdef _WIN32
                  HKEY hKey;
                  if (RegOpenKeyEx(HKEY_LOCAL_MACHINE,
                                  TEXT("HARDWARE\\DESCRIPTION\\System\\CentralProcessor\\0"),
                                  0,
                                  KEY_READ,
                                  &hKey) == ERROR_SUCCESS) {
                      DWORD cpu_brand_size = 0;
                      if (RegQueryValueExW(hKey,
                                          L"ProcessorNameString",
                                          NULL,
                                          NULL,
                                          NULL,
                                          &cpu_brand_size) == ERROR_SUCCESS) {
                          std::vector<wchar_t> wbuffer(cpu_brand_size / sizeof(wchar_t));
                          if (RegQueryValueExW(hKey,
                                              L"ProcessorNameString",
                                              NULL,
                                              NULL,
                                              (LPBYTE)wbuffer.data(),
                                              &cpu_brand_size) == ERROR_SUCCESS) {
                              int size_needed = WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, NULL, 0, NULL, NULL);
                              if (size_needed > 0) {
                                  description.resize(size_needed);
                                  WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, &description[0], size_needed, NULL, NULL);
                                  if (description.find('\0') != std::string::npos) {
                                      description.resize(description.find('\0'));
                                  }
                              }
                          }
                      }
                      RegCloseKey(hKey);
                  }
          #endif
          '@
          
          Set-Content -Path "ggml-cpu-fix.txt" -Value $patchContent
          
          # 创建用于替换的脚本
          $scriptContent = @'
          param($buildDir)
          
          $fixContent = Get-Content "ggml-cpu-fix.txt" -Raw
          
          # 查找所有的ggml-cpu.cpp文件
          Get-ChildItem -Path $buildDir -Filter "ggml-cpu.cpp" -Recurse | ForEach-Object {
              $filePath = $_.FullName
              Write-Host "正在处理文件: $filePath"
              
              $content = Get-Content $filePath -Raw
              
              # 替换Windows部分代码
              if ($content -match "#elif defined\(_WIN32\)[^#]+#endif") {
                  $pattern = "#elif defined\(_WIN32\)[^#]+#endif"
                  $newContent = $content -replace $pattern, "#elif defined(_WIN32)`r`n$fixContent`r`n"
                  Set-Content -Path $filePath -Value $newContent
                  Write-Host "已修复文件: $filePath"
              }
          }
          '@
          
          Set-Content -Path "fix-whisper-rs.ps1" -Value $scriptContent
          
          # 设置环境变量以在构建前运行修复脚本
          echo "WHISPER_RS_PRE_BUILD_SCRIPT=$PWD\fix-whisper-rs.ps1" >> $env:GITHUB_ENV

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 构建项目
        env:
          CMAKE_C_FLAGS: ${{ env.CMAKE_C_FLAGS }}
          CMAKE_CXX_FLAGS: ${{ env.CMAKE_CXX_FLAGS }}
          RUSTFLAGS: "-C target-cpu=native"
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.os == 'ubuntu-latest' && '"-I/usr/include/clang"' || '' }}
          CFLAGS: ""  # 清空 CFLAGS 以避免继承有问题的标志
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --verbose
        timeout-minutes: 30
        
      # 添加Windows平台下的修复步骤
      - name: 应用Windows补丁并构建
        if: matrix.os == 'windows-latest'
        run: |
          # 运行修复脚本
          if (Test-Path env:WHISPER_RS_PRE_BUILD_SCRIPT) {
            Write-Host "运行预构建修复脚本..."
            $buildDir = Join-Path $PWD "target\release\build"
            powershell -File $env:WHISPER_RS_PRE_BUILD_SCRIPT -buildDir $buildDir
            
            # 重新执行构建命令
            cargo build --release --verbose
          }

      - name: 创建资源目录
        run: |
          mkdir -p resources/models

      - name: 打包应用 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk.exe release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          7z a ../${{ matrix.asset_name }} *

      - name: 打包应用 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          tar -czvf ../${{ matrix.asset_name }} *

      - name: 打包应用 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          zip -r ../${{ matrix.asset_name }} *

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 准备发布文件
        run: |
          mkdir -p ./release-files
          cp ./artifacts/autotalk-windows-x64.zip/autotalk-windows-x64.zip ./release-files/
          cp ./artifacts/autotalk-linux-x64.tar.gz/autotalk-linux-x64.tar.gz ./release-files/
          cp ./artifacts/autotalk-macos-x64.zip/autotalk-macos-x64.zip ./release-files/
          ls -la ./release-files

      - name: 获取当前日期
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 获取提交哈希
        id: commit
        run: echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 生成版本号
        id: version
        run: echo "VERSION=${{ steps.date.outputs.DATE }}.${{ steps.commit.outputs.COMMIT }}" >> $GITHUB_OUTPUT

      - name: 创建发布
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ github.token }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: AutoTalk ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            ./release-files/autotalk-windows-x64.zip
            ./release-files/autotalk-linux-x64.tar.gz
            ./release-files/autotalk-macos-x64.zip

      - name: 输出调试信息
        if: always()
        run: |
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Date: ${{ steps.date.outputs.DATE }}"
          echo "Commit: ${{ steps.commit.outputs.COMMIT }}"
          ls -la 