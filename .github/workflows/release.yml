name: 构建和发布

on: [push, workflow_dispatch]

# 添加明确的权限设置
permissions:
  contents: write
  packages: write

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: autotalk.exe
            asset_name: autotalk-windows-x64.zip
          - os: ubuntu-latest
            artifact_name: autotalk
            asset_name: autotalk-linux-x64.tar.gz
          - os: macos-latest
            artifact_name: autotalk
            asset_name: autotalk-macos-x64.zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
          target: x86_64-unknown-linux-gnu

      - name: 安装LLVM和其他依赖 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake pkg-config libssl-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libasound2-dev build-essential
          # 确保安装完整的OpenSSL开发包
          sudo apt-get install -y libssl-dev
          # 显式安装OpenSSL 3.0相关包
          sudo apt-get install -y pkg-config
          # 查找OpenSSL库的实际位置
          PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          # 设置明确的OpenSSL库路径
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV
          
          # 准确查找并设置libclang路径
          sudo apt-get install -y libclang1
          LLVM_PATH=$(find /usr/lib -type d -name "llvm-*" | sort -V | tail -n 1)
          if [ -z "$LLVM_PATH" ]; then
            LLVM_PATH="/usr/lib/llvm-14" # 回退到默认版本
            sudo apt-get install -y llvm-14 libclang-14-dev
          fi
          LIBCLANG_PATH="$LLVM_PATH/lib"
          echo "找到libclang路径: $LIBCLANG_PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          
          echo "CMAKE_C_FLAGS=-m64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-m64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm cmake
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "CMAKE_C_FLAGS=-arch arm64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-arch arm64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install llvm -y
          choco install cmake -y
          # 设置环境变量
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "LLVM_CONFIG_PATH=C:\\Program Files\\LLVM\\bin\\llvm-config" >> $env:GITHUB_ENV
          # 添加到PATH - 修复语法
          $env:PATH = "$env:PATH;C:\Program Files\LLVM\bin"
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          # 检查LLVM安装和库文件
          dir "C:\\Program Files\\LLVM\\bin"
          # 设置编译标志
          echo "CMAKE_C_FLAGS=-DUNICODE -D_UNICODE" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-DUNICODE -D_UNICODE" >> $env:GITHUB_ENV
          
          # 创建修复脚本
          @"
          param(`$filePath)
          
          # 读取文件内容
          `$content = Get-Content `$filePath -Raw
          
          # 替换RegQueryValueExA为RegQueryValueExW
          `$newContent = `$content -replace "RegQueryValueExA\(hKey,\s*L\"ProcessorNameString\"", "RegQueryValueExW(hKey, L\"ProcessorNameString\""
          
          # 检查是否有变化
          if (`$newContent -ne `$content) {
              Write-Host "正在修复文件..."
              Set-Content -Path `$filePath -Value `$newContent
              Write-Host "已修复文件: `$filePath"
              return `$true
          }
          
          Write-Host "文件不需要修改或模式匹配失败"
          return `$false
          "@ | Out-File -FilePath fix-ggml-cpu.ps1 -Encoding utf8
          
          Write-Host "修复脚本已创建"
          
          # 设置环境变量，告知何处可以找到修复脚本
          echo "WHISPER_PATCH_SCRIPT=$PWD\fix-ggml-cpu.ps1" >> $env:GITHUB_ENV
          
          # 创建.cargo/config.toml文件
          New-Item -Path ".cargo" -ItemType Directory -Force
          Set-Content -Path ".cargo/config.toml" -Value "[env]`r`nWHISPER_PATCH_SCRIPT = ""fix-ggml-cpu.ps1""`r`n`r`n[build]`r`nrustflags = [""-C"", ""target-cpu=native""]`r`n`r`n[target.x86_64-pc-windows-msvc.whisper-rs-sys]`r`nrustc-env = { WHISPER_PATCH_SCRIPT = ""fix-ggml-cpu.ps1"" }"
          
          # 添加自定义钩子
          $hookDir = "$env:USERPROFILE\.cargo\hooks"
          New-Item -Path $hookDir -ItemType Directory -Force
          Set-Content -Path "$hookDir\pre-build-whisper-rs-sys.bat" -Value "@echo off`r`nsetlocal enabledelayedexpansion`r`n`r`necho 正在执行whisper-rs-sys构建钩子`r`n`r`nif ""%WHISPER_PATCH_SCRIPT%"" == """" (`r`n  echo WHISPER_PATCH_SCRIPT环境变量未设置，跳过修复`r`n  exit 0`r`n)`r`n`r`nfor /r %%f in (*ggml-cpu.cpp) do (`r`n  echo 发现文件: %%f`r`n  powershell -File ""%WHISPER_PATCH_SCRIPT%"" -filePath ""%%f""`r`n)`r`n`r`nexit 0" -Encoding ascii
          
          Write-Host "已设置构建钩子"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 预处理步骤：在源代码下载阶段就进行修改（移到构建前）
      - name: 预处理依赖源码 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 创建修复脚本
          @"
          param(`$filePath)
          
          # 读取文件内容
          `$content = Get-Content `$filePath -Raw
          
          # 替换RegQueryValueExA为RegQueryValueExW
          `$newContent = `$content -replace "RegQueryValueExA\(hKey,\s*L\"ProcessorNameString\"", "RegQueryValueExW(hKey, L\"ProcessorNameString\""
          
          # 检查是否有变化
          if (`$newContent -ne `$content) {
              Write-Host "正在修复文件..."
              Set-Content -Path `$filePath -Value `$newContent
              Write-Host "已修复文件: `$filePath"
              return `$true
          }
          
          # 尝试完全替换Windows部分代码
          $windowsCode = "#ifdef _WIN32`r`n" +
              "        HKEY hKey;`r`n" +
              "        if (RegOpenKeyEx(HKEY_LOCAL_MACHINE,`r`n" +
              "                        TEXT(""HARDWARE\\DESCRIPTION\\System\\CentralProcessor\\0""),`r`n" +
              "                        0,`r`n" +
              "                        KEY_READ,`r`n" +
              "                        &hKey) == ERROR_SUCCESS) {`r`n" +
              "            DWORD cpu_brand_size = 0;`r`n" +
              "            if (RegQueryValueExW(hKey,`r`n" +
              "                                L""ProcessorNameString"",`r`n" +
              "                                NULL,`r`n" +
              "                                NULL,`r`n" +
              "                                NULL,`r`n" +
              "                                &cpu_brand_size) == ERROR_SUCCESS) {`r`n" +
              "                std::vector<wchar_t> wbuffer(cpu_brand_size / sizeof(wchar_t));`r`n" +
              "                if (RegQueryValueExW(hKey,`r`n" +
              "                                    L""ProcessorNameString"",`r`n" +
              "                                    NULL,`r`n" +
              "                                    NULL,`r`n" +
              "                                    (LPBYTE)wbuffer.data(),`r`n" +
              "                                    &cpu_brand_size) == ERROR_SUCCESS) {`r`n" +
              "                    int size_needed = WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, NULL, 0, NULL, NULL);`r`n" +
              "                    if (size_needed > 0) {`r`n" +
              "                        description.resize(size_needed);`r`n" +
              "                        WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, &description[0], size_needed, NULL, NULL);`r`n" +
              "                        if (description.find('\\0') != std::string::npos) {`r`n" +
              "                            description.resize(description.find('\\0'));`r`n" +
              "                        }`r`n" +
              "                    }`r`n" +
              "                }`r`n" +
              "            }`r`n" +
              "            RegCloseKey(hKey);`r`n" +
              "        }`r`n" +
              "#endif"
          
          # 使用正则表达式替换整个Windows代码块
          `$pattern = "(?s)#ifdef _WIN32.*?RegQueryValueExA.*?RegCloseKey.*?#endif"
          `$newContent = [regex]::Replace(`$content, `$pattern, `$windowsCode)
          
          if (`$newContent -ne `$content) {
              Write-Host "正在替换整个Windows代码块..."
              Set-Content -Path `$filePath -Value `$newContent
              Write-Host "已完全替换Windows代码块: `$filePath"
              return `$true
          }
          
          Write-Host "无法自动修复文件: `$filePath"
          return `$false
          "@ | Out-File -FilePath fix-ggml-cpu.ps1 -Encoding utf8
          
          Write-Host "将在cargo依赖下载后应用修复"
          
          # 设置环境变量，告知何处可以找到修复脚本
          echo "WHISPER_PATCH_SCRIPT=$PWD\fix-ggml-cpu.ps1" >> $env:GITHUB_ENV
          
          # 创建.cargo/config.toml文件
          New-Item -Path ".cargo" -ItemType Directory -Force
          Set-Content -Path ".cargo/config.toml" -Value "[env]`r`nWHISPER_PATCH_SCRIPT = ""fix-ggml-cpu.ps1""`r`n`r`n[build]`r`nrustflags = [""-C"", ""target-cpu=native""]`r`n`r`n[target.x86_64-pc-windows-msvc.whisper-rs-sys]`r`nrustc-env = { WHISPER_PATCH_SCRIPT = ""fix-ggml-cpu.ps1"" }"
          
          # 添加自定义钩子
          $hookDir = "$env:USERPROFILE\.cargo\hooks"
          New-Item -Path $hookDir -ItemType Directory -Force
          Set-Content -Path "$hookDir\pre-build-whisper-rs-sys.bat" -Value "@echo off`r`nsetlocal enabledelayedexpansion`r`n`r`necho 正在执行whisper-rs-sys构建钩子`r`n`r`nif ""%WHISPER_PATCH_SCRIPT%"" == """" (`r`n  echo WHISPER_PATCH_SCRIPT环境变量未设置，跳过修复`r`n  exit 0`r`n)`r`n`r`nfor /r %%f in (*ggml-cpu.cpp) do (`r`n  echo 发现文件: %%f`r`n  powershell -File ""%WHISPER_PATCH_SCRIPT%"" -filePath ""%%f""`r`n)`r`n`r`nexit 0" -Encoding ascii
          
          Write-Host "已设置构建钩子"

      - name: 构建项目
        env:
          CMAKE_C_FLAGS: ${{ env.CMAKE_C_FLAGS }}
          CMAKE_CXX_FLAGS: ${{ env.CMAKE_CXX_FLAGS }}
          RUSTFLAGS: "-C target-cpu=native"
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.os == 'ubuntu-latest' && '"-I/usr/include/clang"' || '' }}
          CFLAGS: ""  # 清空 CFLAGS 以避免继承有问题的标志
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --verbose
        timeout-minutes: 30
        
      # 添加Windows平台下的修复步骤
      - name: 应用Windows补丁并构建
        if: matrix.os == 'windows-latest'
        run: |
          # 创建直接替换脚本
          @"
          param(`$buildDir)
          
          # 在目标目录中查找所有ggml-cpu.cpp文件
          Get-ChildItem -Path `$buildDir -Filter "ggml-cpu.cpp" -Recurse | ForEach-Object {
              Write-Host "正在处理文件: `$(`$_.FullName)"
              
              # 读取文件内容
              `$content = Get-Content `$_.FullName -Raw
              
              # 替换RegQueryValueExA为RegQueryValueExW
              `$newContent = `$content -replace "RegQueryValueExA\(hKey,\s*L\"ProcessorNameString\"", "RegQueryValueExW(hKey, L\"ProcessorNameString\""
              
              # 检查是否有变化
              if (`$newContent -ne `$content) {
                  Write-Host "正在修复文件..."
                  Set-Content -Path `$_.FullName -Value `$newContent
                  Write-Host "已修复文件: `$(`$_.FullName)"
              } else {
                  Write-Host "文件不需要修改或模式匹配失败"
                  
                  # 尝试完全替换Windows部分代码
                  $windowsCode = "#ifdef _WIN32`r`n" +
                      "        HKEY hKey;`r`n" +
                      "        if (RegOpenKeyEx(HKEY_LOCAL_MACHINE,`r`n" +
                      "                        TEXT(""HARDWARE\\DESCRIPTION\\System\\CentralProcessor\\0""),`r`n" +
                      "                        0,`r`n" +
                      "                        KEY_READ,`r`n" +
                      "                        &hKey) == ERROR_SUCCESS) {`r`n" +
                      "            DWORD cpu_brand_size = 0;`r`n" +
                      "            if (RegQueryValueExW(hKey,`r`n" +
                      "                                L""ProcessorNameString"",`r`n" +
                      "                                NULL,`r`n" +
                      "                                NULL,`r`n" +
                      "                                NULL,`r`n" +
                      "                                &cpu_brand_size) == ERROR_SUCCESS) {`r`n" +
                      "                std::vector<wchar_t> wbuffer(cpu_brand_size / sizeof(wchar_t));`r`n" +
                      "                if (RegQueryValueExW(hKey,`r`n" +
                      "                                    L""ProcessorNameString"",`r`n" +
                      "                                    NULL,`r`n" +
                      "                                    NULL,`r`n" +
                      "                                    (LPBYTE)wbuffer.data(),`r`n" +
                      "                                    &cpu_brand_size) == ERROR_SUCCESS) {`r`n" +
                      "                    int size_needed = WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, NULL, 0, NULL, NULL);`r`n" +
                      "                    if (size_needed > 0) {`r`n" +
                      "                        description.resize(size_needed);`r`n" +
                      "                        WideCharToMultiByte(CP_UTF8, 0, wbuffer.data(), -1, &description[0], size_needed, NULL, NULL);`r`n" +
                      "                        if (description.find('\\0') != std::string::npos) {`r`n" +
                      "                            description.resize(description.find('\\0'));`r`n" +
                      "                        }`r`n" +
                      "                    }`r`n" +
                      "                }`r`n" +
                      "            }`r`n" +
                      "            RegCloseKey(hKey);`r`n" +
                      "        }`r`n" +
                      "#endif"
                  
                  # 使用正则表达式替换整个Windows代码块
                  `$pattern = "(?s)#ifdef _WIN32.*?RegQueryValueExA.*?RegCloseKey.*?#endif"
                  `$newContent = [regex]::Replace(`$content, `$pattern, `$windowsCode)
                  
                  if (`$newContent -ne `$content) {
                      Write-Host "正在替换整个Windows代码块..."
                      Set-Content -Path `$_.FullName -Value `$newContent
                      Write-Host "已完全替换Windows代码块: `$(`$_.FullName)"
                  } else {
                      Write-Host "无法自动修复，将显示文件内容进行调试..."
                      `$fileContent = Get-Content `$_.FullName -Raw
                      Write-Host "`$fileContent"
                  }
              }
          }
          "@ | Out-File -FilePath fix-whisper-rs.ps1 -Encoding utf8
          
          Write-Host "修复脚本已创建"
          
          # 查找构建目录
          $buildDir = Join-Path $PWD "target\release\build"
          
          # 运行修复脚本
          powershell -File fix-whisper-rs.ps1 -buildDir $buildDir
          
          # 重新构建
          cargo build --release --verbose

      - name: 创建资源目录
        run: |
          mkdir -p resources/models

      - name: 打包应用 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk.exe release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          7z a ../${{ matrix.asset_name }} *

      - name: 打包应用 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          tar -czvf ../${{ matrix.asset_name }} *

      - name: 打包应用 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          zip -r ../${{ matrix.asset_name }} *

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 准备发布文件
        run: |
          mkdir -p ./release-files
          cp ./artifacts/autotalk-windows-x64.zip/autotalk-windows-x64.zip ./release-files/
          cp ./artifacts/autotalk-linux-x64.tar.gz/autotalk-linux-x64.tar.gz ./release-files/
          cp ./artifacts/autotalk-macos-x64.zip/autotalk-macos-x64.zip ./release-files/
          ls -la ./release-files

      - name: 获取当前日期
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 获取提交哈希
        id: commit
        run: echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 生成版本号
        id: version
        run: echo "VERSION=${{ steps.date.outputs.DATE }}.${{ steps.commit.outputs.COMMIT }}" >> $GITHUB_OUTPUT

      - name: 创建发布
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ github.token }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: AutoTalk ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            ./release-files/autotalk-windows-x64.zip
            ./release-files/autotalk-linux-x64.tar.gz
            ./release-files/autotalk-macos-x64.zip

      - name: 输出调试信息
        if: always()
        run: |
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Date: ${{ steps.date.outputs.DATE }}"
          echo "Commit: ${{ steps.commit.outputs.COMMIT }}"
          ls -la 