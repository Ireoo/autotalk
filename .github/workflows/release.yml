name: 构建和发布

on: [push, workflow_dispatch]

# 添加明确的权限设置
permissions:
  contents: write
  packages: write

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: autotalk.exe
            asset_name: autotalk-windows-x64.zip
          - os: ubuntu-latest
            artifact_name: autotalk
            asset_name: autotalk-linux-x64.tar.gz
          - os: macos-latest
            artifact_name: autotalk
            asset_name: autotalk-macos-x64.zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
          target: x86_64-unknown-linux-gnu

      - name: 安装LLVM和其他依赖 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake pkg-config libssl-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libasound2-dev build-essential
          # 确保安装完整的OpenSSL开发包
          sudo apt-get install -y libssl-dev
          # 显式安装OpenSSL 3.0相关包
          sudo apt-get install -y pkg-config
          # 查找OpenSSL库的实际位置
          PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          # 设置明确的OpenSSL库路径
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV
          
          # 准确查找并设置libclang路径
          sudo apt-get install -y libclang1
          LLVM_PATH=$(find /usr/lib -type d -name "llvm-*" | sort -V | tail -n 1)
          if [ -z "$LLVM_PATH" ]; then
            LLVM_PATH="/usr/lib/llvm-14" # 回退到默认版本
            sudo apt-get install -y llvm-14 libclang-14-dev
          fi
          LIBCLANG_PATH="$LLVM_PATH/lib"
          echo "找到libclang路径: $LIBCLANG_PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          
          echo "CMAKE_C_FLAGS=-m64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-m64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm cmake
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "CMAKE_C_FLAGS=-arch arm64" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-arch arm64" >> $GITHUB_ENV

      - name: 安装LLVM和其他依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install llvm -y
          choco install cmake -y
          choco install visualstudio2022buildtools -y
          choco install visualstudio2022-workload-vctools -y
          
          # 设置环境变量
          $llvmPath = "C:\Program Files\LLVM"
          echo "LIBCLANG_PATH=$llvmPath\bin" >> $env:GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$llvmPath\bin\llvm-config.exe" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$llvmPath" >> $env:GITHUB_ENV
          echo "LLVM_DIR=$llvmPath\lib\cmake\llvm" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV
          echo "CMAKE_BUILD_TYPE=Release" >> $env:GITHUB_ENV
          
          # 添加到PATH
          $env:PATH = "$env:PATH;$llvmPath\bin;C:\Program Files\CMake\bin"
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          
          # 设置编译标志
          echo "CFLAGS=/utf-8 /D_UNICODE /DUNICODE /Zc:wchar_t" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/utf-8 /D_UNICODE /DUNICODE /Zc:wchar_t" >> $env:GITHUB_ENV
          
          # 创建CMakeLists.txt
          @"
          cmake_minimum_required(VERSION 3.10)
          project(whisper-rs-sys)
          
          # 设置CMake策略
          cmake_policy(SET CMP0066 NEW)
          cmake_policy(SET CMP0082 NEW)
          cmake_policy(SET CMP0156 NEW)
          cmake_policy(SET CMP0128 NEW)
          
          # 设置Windows特定选项
          if(WIN32)
              add_definitions(-DUNICODE -D_UNICODE)
              set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} /EHsc")
              set(CMAKE_CXX_STANDARD 17)
              set(CMAKE_CXX_STANDARD_REQUIRED ON)
              set(CMAKE_CXX_EXTENSIONS OFF)
              set(CMAKE_C_STANDARD 11)
              set(CMAKE_C_STANDARD_REQUIRED ON)
              set(CMAKE_C_EXTENSIONS OFF)
          endif()
          
          # 查找必要的包
          find_package(OpenSSL REQUIRED)
          find_package(LLVM REQUIRED CONFIG)
          
          # 添加源文件
          add_library(whisper-rs-sys SHARED
              src/whisper.cpp
          )
          
          # 设置包含目录
          target_include_directories(whisper-rs-sys PRIVATE
              ${CMAKE_CURRENT_SOURCE_DIR}/include
              ${LLVM_INCLUDE_DIRS}
              ${OPENSSL_INCLUDE_DIR}
          )
          
          # 链接必要的库
          if(WIN32)
              target_link_libraries(whisper-rs-sys PRIVATE
                  advapi32
                  kernel32
                  ${LLVM_LIBRARIES}
                  OpenSSL::SSL
                  OpenSSL::Crypto
              )
          endif()
          
          # 设置输出目录
          set_target_properties(whisper-rs-sys PROPERTIES
              RUNTIME_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/bin"
              LIBRARY_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/lib"
              ARCHIVE_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/lib"
          )
          "@ | Out-File -FilePath CMakeLists.txt -Encoding utf8
          
          Write-Host "CMake配置已更新"
          
          # 创建构建目录并配置CMake
          New-Item -ItemType Directory -Force -Path "build"
          Set-Location "build"
          
          # 配置CMake
          Write-Host "正在配置CMake..."
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$llvmPath" -DLLVM_DIR="$llvmPath\lib\cmake\llvm"
          
          # 构建项目
          Write-Host "正在构建项目..."
          cmake --build . --config Release
          
          # 检查构建结果
          if ($LASTEXITCODE -ne 0) {
              Write-Host "构建失败，错误代码: $LASTEXITCODE"
              exit 1
          }
          
          Write-Host "构建成功完成"

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 构建项目
        env:
          CMAKE_C_FLAGS: ${{ env.CMAKE_C_FLAGS }}
          CMAKE_CXX_FLAGS: ${{ env.CMAKE_CXX_FLAGS }}
          RUSTFLAGS: "-C target-cpu=native"
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.os == 'ubuntu-latest' && '"-I/usr/include/clang"' || '' }}
          CFLAGS: ""  # 清空 CFLAGS 以避免继承有问题的标志
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --verbose
        timeout-minutes: 30
        
      # 添加Windows平台下的修复步骤
      - name: 应用Windows补丁并构建
        if: matrix.os == 'windows-latest'
        run: |
          # 创建修复脚本
          @"@echo off
          echo 正在应用修复补丁...
          
          REM 设置环境变量
          set CFLAGS=/utf-8 /D_UNICODE /DUNICODE /Zc:wchar_t
          set CXXFLAGS=/utf-8 /D_UNICODE /DUNICODE /Zc:wchar_t
          
          REM 清理之前的构建
          echo 开始清理...
          cargo clean
          
          REM 开始构建，但在复制源代码后暂停
          echo 开始构建...
          cargo build --release
          
          echo 构建过程开始，定位ggml-cpu.cpp文件...
          
          REM 查找构建过程中生成的ggml-cpu.cpp文件
          for /f "delims=" %%i in ('dir /s /b target\release\build\whisper-rs-sys*\out\whisper.cpp\ggml\src\ggml-cpu\ggml-cpu.cpp') do (
              echo 找到文件: %%i
              
              REM 修改该文件
              echo 修改文件...
              powershell -Command "(Get-Content '%%i') -replace 'RegQueryValueExA', 'RegQueryValueExW' | Set-Content '%%i'"
              powershell -Command "(Get-Content '%%i') -replace 'TEXT\(""ProcessorNameString""\)', 'L""ProcessorNameString""' | Set-Content '%%i'"
              
              echo 文件已修改，继续构建...
              cargo build --release
              
              goto :done
          )
          
          REM 如果在release中没找到，尝试debug目录
          for /f "delims=" %%i in ('dir /s /b target\debug\build\whisper-rs-sys*\out\whisper.cpp\ggml\src\ggml-cpu\ggml-cpu.cpp') do (
              echo 找到文件: %%i
              
              REM 修改该文件
              echo 修改文件...
              powershell -Command "(Get-Content '%%i') -replace 'RegQueryValueExA', 'RegQueryValueExW' | Set-Content '%%i'"
              powershell -Command "(Get-Content '%%i') -replace 'TEXT\(""ProcessorNameString""\)', 'L""ProcessorNameString""' | Set-Content '%%i'"
              
              echo 文件已修改，继续构建...
              cargo build
              
              goto :done
          )
          
          :done
          echo 脚本执行完成"@ | Out-File -FilePath apply-fix.bat -Encoding utf8
          
          # 执行修复脚本
          .\apply-fix.bat

      - name: 创建资源目录
        run: |
          mkdir -p resources/models

      - name: 打包应用 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk.exe release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          7z a ../${{ matrix.asset_name }} *

      - name: 打包应用 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          tar -czvf ../${{ matrix.asset_name }} *

      - name: 打包应用 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir release-package
          cp target/release/autotalk release-package/
          cp -r assets release-package/
          cp -r resources release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cd release-package
          zip -r ../${{ matrix.asset_name }} *

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 准备发布文件
        run: |
          mkdir -p ./release-files
          cp ./artifacts/autotalk-windows-x64.zip/autotalk-windows-x64.zip ./release-files/
          cp ./artifacts/autotalk-linux-x64.tar.gz/autotalk-linux-x64.tar.gz ./release-files/
          cp ./artifacts/autotalk-macos-x64.zip/autotalk-macos-x64.zip ./release-files/
          ls -la ./release-files

      - name: 获取当前日期
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 获取提交哈希
        id: commit
        run: echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 生成版本号
        id: version
        run: echo "VERSION=${{ steps.date.outputs.DATE }}.${{ steps.commit.outputs.COMMIT }}" >> $GITHUB_OUTPUT

      - name: 创建发布
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ github.token }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: AutoTalk ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            ./release-files/autotalk-windows-x64.zip
            ./release-files/autotalk-linux-x64.tar.gz
            ./release-files/autotalk-macos-x64.zip

      - name: 输出调试信息
        if: always()
        run: |
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Date: ${{ steps.date.outputs.DATE }}"
          echo "Commit: ${{ steps.commit.outputs.COMMIT }}"
          ls -la 