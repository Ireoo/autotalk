[build]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-args=-mconsole"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-args=-mconsole"]

# 添加MSYS2 MinGW平台设置
[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-args=-mconsole"]

[target.i686-pc-windows-gnu]
rustflags = ["-C", "link-args=-mconsole"]

# 设置环境变量
[env]
# 调试信息
RUST_BACKTRACE = "1"

# 设置UTF-8编码
RUSTFLAGS = "--codegen=codegen-units=1"
CARGO_ENCODED_RUSTFLAGS = "1"

# 设置CMake参数
CMAKE_C_FLAGS = "-utf8 -D_UNICODE -DUNICODE"
CMAKE_CXX_FLAGS = "-utf8 -D_UNICODE -DUNICODE" 